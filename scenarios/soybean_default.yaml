# DTDC Simulator — first-estimate scenario (soybean base case)
# Companion to DTDC_Simulator_BuildSpec.md. Units are SI.
#
# Material physical properties (GAB isotherm, latent heats, densities, ...)
# live in properties/soybean.yaml (BuildSpec §11: "one file per material
# property set under properties/"), resolved automatically from `material:`
# below. This file binds that property set to geometry + model params +
# operating/disturbance defaults + sim config, per §11's scenario-file shape.
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]  taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]  order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]    standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870   -> geometry, base operating point, C0/C1, correlations

material: soybean

# ------------------------------------------------------------------ geometry
# Coletto's six-tray base arrangement: 3 pre-desolventizing + 3 countercurrent
# (the last is the sparge tray). Coletto uses 4 m diameter at ~11.9 kg/s dry
# solid; scaling diameter by sqrt(flow) gives ~5.8 m at this scenario's 25
# kg/s, rounded to the industrial 6 m shell. `bed_height_m` is MAXIMUM retained
# depth; nominal 50% fill gives 0.3/0.3/0.3/1.0/0.6/0.75 m.
# The 0.75 m sparge bed remains inside the 0.6-1.1 m industrial range and
# brings hot-contact inventory residence to the literature's >=20 min bound.
# DC (dryer/cooler) stages appended (not in Coletto) as first-estimate.
geometry:
  stages:
    # Real DTDC tower geometry: ~6 m diameter, and the PACKED bed depths differ by role --
    # PREDESOLV trays run SHALLOW (~15 cm, fast surface-flash desolventizing), TOASTING
    # (MAIN/SPARGE) trays run DEEP (~60-100 cm, long moist-heat contact). NB the physical
    # vessel is ~20 m tall, but that is mostly inter-tray VAPOR headspace, which this model
    # does NOT resolve -- only the packed solid beds are modeled, summing to 3.25 m loaded
    # (the "packed bed total height" the meal-bed profile shows). Per-tray indirect_steam is
    # retuned below so the PD section reaches hexane bp (~69 C) and desolventizes, not just heats.
    - {id: PD1, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}   # 0.30 m loaded at nominal 50% fill
    - {id: PD2, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}
    - {id: PD3, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}
    - {id: MN1, role: MAIN,      vapor_path: THROUGH_BED, diameter_m: 6.0, bed_height_m: 2.00}   # 1.00 m loaded
    - {id: MN2, role: MAIN,      vapor_path: THROUGH_BED, diameter_m: 6.0, bed_height_m: 1.20}   # 0.60 m loaded
    - {id: SP1, role: SPARGE,    vapor_path: STEAM_SOURCE, diameter_m: 6.0, bed_height_m: 1.50}   # 0.75 m loaded
    # DR1/CL1 sized so the bed-holdup mass balance (added alongside transfer position
    # becoming a real MV) settles at ~65% level at default gate/sweep settings,
    # leaving headroom before a narrowed gate genuinely floods the tray.
    # arm_mixing_factor: per-tray residence multiplier at the common shaft rpm (= tau/base_residence).
    # The DC trays' arms turn over material FASTER than the DT trays (lower factor -> shorter residence),
    # which rate-limits their falling-rate drying so the meal stops at the product spec instead of racing
    # to the hot-/ambient-air isotherm equilibrium. DR1=1.07 -> ~94 s (dryer ~12.2%wb); CL1=0.69 -> ~61 s
    # (cooler ~11%wb). DT trays omit it (default 1.0). This REPLACES the old per-tray rpm hack (physically
    # impossible: one shaft = one rpm). Calibrated values; see DECISIONS.
    - {id: DR1, role: DRYER,     diameter_m: 4.0, bed_height_m: 0.60, arm_mixing_factor: 1.07}   # [CALIBRATED CLOSURE]
    - {id: CL1, role: COOLER,    diameter_m: 4.0, bed_height_m: 0.60, arm_mixing_factor: 0.69}   # [CALIBRATED CLOSURE]

# Solids-transfer hardware is configured independently from tray thermal role
# and vapor routing. The three PD trays use passive shaft-swept ports: they
# have no fictitious per-tray PLC gate. The lower deep beds have controlled
# discharge devices; the DT->DC and final product rotary valves are explicit
# vapor/air seals. All positions remain 50%, so this topology migration is
# exactly equivalent to the calibrated legacy discharge law at the seed.
topology:
  solid_transfers:
    - {id: PD1_TO_PD2, from_stage: PD1, to_stage: PD2, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: PD2_TO_PD3, from_stage: PD2, to_stage: PD3, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: PD3_TO_MN1, from_stage: PD3, to_stage: MN1, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: MN1_TO_MN2, from_stage: MN1, to_stage: MN2, device_type: CONTROLLED_GATE, controlled: true}
    - {id: MN2_TO_SP1, from_stage: MN2, to_stage: SP1, device_type: CONTROLLED_GATE, controlled: true}
    - {id: SP1_TO_DR1, from_stage: SP1, to_stage: DR1, device_type: ROTARY_AIRLOCK, controlled: true, vapor_seal: true}
    - {id: DR1_TO_CL1, from_stage: DR1, to_stage: CL1, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: CL1_PRODUCT, from_stage: CL1, to_stage: null, device_type: ROTARY_AIRLOCK, controlled: true, vapor_seal: true}

# ------------------------------------------------------------------ model params
model:
  D_eff: 4.0e-10               # m2/s  [PAPER] Cardarelli, Crapiste & Mattea (2002) Table 1, exact cited value
  D_ax:  1.022e-3              # m2/s  [PAPER] Coletto supp. Table 1, "Hexane axial diffusivity" (Cardarelli 1998)
  n_particle_layers: 12       # -     [PAPER] Coletto uses 12 spherical FVM shells
  nz_per_zone: 20             # -     [NUMERICAL] axial cells per zone per tray
  D_HW: 1.33e-5              # m2/s  [PAPER] Coletto supp. Table 1, "Hexane-water molecular diffusivity" (Cardarelli 1998)
  htc_correlation: {form: faner, c: 0.6949, m: 0.579, n: 0.3333}  # [PAPER] Nu=0.6949 Re^0.579 Pr^(1/3) (B.7)
  # DT fixed-point sweep controls (§7.8)
  outer_relaxation: 0.5       # [NUMERICAL] under-relaxation
  outer_tol: 1.0e-5           # [NUMERICAL]
  outer_max_iter: 100         # [NUMERICAL]
  # Retuned this session, empirically, once wired into bed_transport_coefficients (previously
  # declared but never connected to anything -- confirmed by a repo-wide search before this
  # fix): a real DT bed is continuously mechanically swept/agitated, a fundamentally stronger
  # heat/mass-transfer regime than the passive Nu-Re packed-bed correlation alone predicts.
  # gain=1.0 (form: hQ *= 1 + gain*rpm^2) lands DCZ's converged temperature in its own
  # validated ~380-383 K band (vs ~390-410 K unwired/under-tuned) -- see DECISIONS.md.
  sweep_arm_transfer_gain: 0.0   # D4 resolved: Coletto-faithful B.7 hQ; old empirical gain is inert
  # M3a (BuildSpec §7.9): DT-role stage equilibrium targets now come from the
  # real core/dt_solver.py::solve_dt() zonal solve (PHZ/FTRZ/DCZ), re-run on
  # the periodic cadence below — no more fitted "duty saturation curve";
  # driven by the real dH_vap/T_boil/GAB-isotherm/particle physics in
  # properties/soybean.yaml plus the D_eff/D_ax/htc_correlation/etc. above.
  base_residence_s: 90.0      # s  [CALIBRATED DYNAMIC CLOSURE] nominal per-stage lag at reference sweep
                              #    speed (3 rpm) and gate opening (50%). Cascaded across 8 stages this
                              #    settles in ~20-40 simulated minutes, in line with a real DT's
                              #    ~20-30 min total residence — see sim.speed_factor below for why
                              #    that's still practical to watch interactively.
  # DT solve scheduling (M3a, §7.9): solve_dt() is NOT re-run every 0.2s tick;
  # only every dt_resolve_interval_s of SIM time (that value is now a HOT,
  # live-tunable seed in operating_defaults below, not here -- see its own
  # comment there for the wall-clock-gap math).
  dt_nz_phz: 20                  # -  [NUMERICAL] same mesh as the release benchmark
  dt_nz_ftrz: 20                 # -  [NUMERICAL] avoids a mesh-dependent FTRZ/DCZ handoff
  dt_nz_dcz: 20                  # -  [NUMERICAL] coarse 8-cell seed over-predicted residual hexane
  # DT bottom vapor boundary (documented simplification, same category as
  # dt_solver.py's own sparge-BC assumption): "clean" vapor arriving below the
  # bottommost DT tray (rotary lock / DC side), before SP1's own direct steam
  # mixes in. No real DC->DT vapor-return stream is modeled at this fidelity.
  # The lower-boundary water allowance is audited over 0.10-0.40 kg/s. Its
  # principal observable is dome temperature/composition; the configured
  # 0.25 kg/s gives ~72.4 C / 90.3 wt% hexane. It is included with sparge
  # steam in the delivered-direct ledger, with top carry-through subtracted.
  dt_vapor_feed_water_kg_s: 0.25  # kg/s  [PLACE] lower-boundary clean-vapor allowance; post-refactor
                                  # benchmark trim gives ~72 C / ~90 wt% hexane at the dome. It is
                                  # included with sparge steam in the delivered-direct heat ledger,
                                  # and top water-vapor carry-through is explicitly subtracted.
  dt_vapor_feed_hex_kg_s: 0.0005  # kg/s  [PLACE]
  dt_vapor_feed_T: 371.0          # K     [PLACE]
  # DC residual-hexane desorption -- mechanistic (core/dc.py::desorb_hexane): removal rate =
  # dc_hexane_mtc * air_flow * (y_surf - y_air), y_surf = a_h(X2,T)*p_sat_hexane(T)/P the solid's
  # escaping tendency (GAB isotherm + Antoine, SAME physics as the DT/DCZ). Now ANCHORED to real
  # US-plant data: EPA AP-42 9.11.1 Table 4-4 gives meal hexane ~507 ppm at the DT exit -> ~397
  # (dryer) -> ~323 (cooler/product), range 110-650. Calibrated so this scenario's high-feed base
  # case (DT exit ~980 ppm) lands the product ~300 ppm, i.e. the ~30% cooler + ~57% dryer cascade
  # of a high-DT-exit plant (cf. EPA plant F: 1380 -> 440 ppm). Drying-air hexane (~78 ppm) stays
  # well under the ~1100 ppm (10% LEL) safety limit. TEMPERATURE LAW: the escaping-tendency p_sat
  # gives the (moderate) cooler-desorbs-less behaviour EPA shows. Naiha & Roques (1983) MEASURED
  # the intraparticle diffusion E=80 kJ/mol, but that is STATIC diffusion and over-predicts the
  # T-sensitivity vs the real (agitated/conveyed) DC, whose effective E~20 kJ/mol per EPA -- so we
  # do NOT apply the full 80; surface renewal in the tumbled bed is why the lumped MTC is still
  # needed. [PAPER-anchored]: magnitude from EPA Table 4-4, T-law from the escaping tendency.
  dc_hexane_mtc: 1.3e-2           # -  [PAPER-anchored] EPA AP-42 9.11.1 Table 4-4 meal-hexane cascade
  # SPARGE (direct) steam CONTACT pressure -> its saturation temperature is the DCZ bottom-BC steam
  # temperature (core/dt_solver.py's T_bottom). This is NOT the 6.9 barG supply header
  # (steam_supply_pressure_barg above, the SCADA "PARA" reading) -- the steam THROTTLES from the
  # header through the sparge-tray apertures (AOCS/Kemper 2019: a 0.35-0.70 bar drop across the
  # sparge tray) into the meal bed, arriving as ~3 barG / ~144 C. That matches the doc's own
  # "150-160 C superheated steam after the flow control valve". Using the full 170 C header as the
  # CONTACT temperature is unphysical (superheated steam at bed pressure evaporates moisture rather
  # than condensing onto the meal, so it over-DRIES the DT below the 16-21% exit band) -- the
  # throttled ~144 C value both condenses correctly (giving realistic exit moisture) and keeps the
  # dome vapor in its 70-75 C optimum. See DECISIONS / the model-constant tuning this session.
  direct_steam_pressure_barg: 3.0 # bar g, sparge steam AT THE MEAL (throttled from the 6.9 barG header)
  # Lower-DT (FTRZ<->DCZ sparge) pressure above the ~atmospheric dome, from the sparge-tray
  # aperture drop (Kemper 2019, 0.35-0.70 kg/cm2 ~= 0.34-0.69 bar). Raises the water saturation
  # temperature to ~111 C so the WET meal in the toasting zone is pinned there (evaporative
  # pinning) at a_w~0.8 holding ~19% moisture, instead of superheating to 123 C and over-drying.
  dt_pressure_drop_barg: 0.5      # bar g, sparge-tray pressure drop (Kemper) -> DCZ T_sat ~111 C
  steam_supply_pressure_barg: 6.9 # bar g, steam header ~170 C saturated (SCADA "PARA") -- HMI readout only
  # DT solve convergence tuning (M3a follow-up, "A2") -- deliberately looser
  # than solve_dt()'s own validation-run defaults (outer_tol=1e-5, both
  # iteration caps=100), profiled+measured this session: dt_solver's own
  # FTRZ<->DCZ outer-loop convergence check applies the same absolute
  # tolerance to a Kelvin-scale quantity (T, ~300-450) and a mass-fraction
  # quantity (wV2, ~0.0005) -- traced directly, wV2 converges by iteration ~5
  # while T is still creeping by <0.001%/iteration at iteration 50+. At these
  # settings: ~3s per solve_dt call (combined with the sorption-heat-source
  # dedup fix, core/zones/particle.py), vs ~10-14s at the tight defaults, for
  # a ~0.7 K / ~2 ppm difference in the converged answer -- negligible next
  # to hQ/hM/aV's own [DERIVED] packed-bed closure uncertainty. See
  # DECISIONS.md's M3a follow-up entry for the full measured comparison.
  dt_outer_tol: 0.05             # -  [NUMERICAL] real-time FTRZ<->DCZ tolerance
  dt_outer_max_iter: 150         # -  [NUMERICAL] adaptive outer-loop cap (extreme-case continuation)
  dt_dcz_inner_max_iter: 100     # -  [NUMERICAL] DCZ inner Gauss-Seidel cap

# ---------------------------------------------------- operating defaults (HOT seeds)
# Coletto base case direction: feed ~26% solvent, ~35% at rotary lock; steam split DT.
operating_defaults:
  feed_flow_rate: 25.0        # kg/s dry solid  [BENCHMARK OPERATING SEED]
  # Post-PHZ-refactor industry seed: 2.50 MW total indirect duty. The physical
  # PREDESOLV section receives 2.30 MW and removes ~14% of feed hexane, matching
  # Coletto's 14.3% base case and the literature's 10-25% range. The remaining
  # 0.20 MW is retained in the lower jacketed trays in the former 1:1:0.4
  # distribution. Delivered direct-steam heat is ~75%, after subtracting top
  # water-vapor carry-through.
  indirect_steam:             # W per DT tray [CALIBRATED OPERATING SEED]
    PD1: 7.666667e5
    PD2: 7.666667e5
    PD3: 7.666666e5
    MN1: 8.33333e4
    MN2: 8.33333e4
    SP1: 3.33334e4
  direct_steam:               # kg/s sparge steam -> ~110 kg/t_raw (Kemper/Svoboda industrial target)
    # 3.9 kg/s puts the sparge at its realistic industrial rate (~110 kg/t_raw). Below ~2 kg/s the
    # sparge is too weak/cool: the abundant vent steam supersaturates the bottom, the DCZ condenses
    # low instead of the cold FTRZ condensing high, and the meal over-wets (the old 1.05 setpoint was
    # a pre-evaporative-pinning tuning artifact). At >=2 kg/s the meal equilibrates to ~19% wb via the
    # isotherm and the excess steam correctly leaves at the dome.
    SP1: 3.9
  sweep_arm_speed:            # rpm [BENCHMARK OPERATING SEED]; one central shaft
    # All trays share one shaft, so these are all equal (the HMI exposes one "arm speed" control that
    # drives every tray together). Per-tray residence differences do NOT come from per-tray rpm (a
    # single shaft can't have that) -- they come from each tray's own geometry.arm_mixing_factor.
    PD1: 3.0
    PD2: 3.0
    PD3: 3.0
    MN1: 3.0
    MN2: 3.0
    SP1: 3.0
    DR1: 3.0
    CL1: 3.0
  transfer_device_position:   # 0-100 %; only real controlled boundaries
    MN1_TO_MN2: 50
    MN2_TO_SP1: 50
    SP1_TO_DR1: 50
    CL1_PRODUCT: 50
  # DC air — RE-TUNED alongside the sparge-steam physics fixes. The DT exits ~109 C / ~18% moisture,
  # so the DC dries it toward the trading limit and cools it to near ambient. The DC is a closed
  # two-sided mass/energy balance with COUPLED air-solid heat transfer, so both air rates set a
  # genuine thermodynamic duty:
  #  * DRYER (360 K = ~87 C, 80 kg/s): the meal enters ~109 C; the air dries it and evaporatively
  #    cools DR1 to ~66 C.
  #  * COOLER (298 K ambient, 250 kg/s): a high ~10:1 air:solid ratio drops CL1 to ~36 C -- within
  #    ~10 C of ambient, per the AOCS doc.
  heated_air_temp: 348.0      # K = ~75 C [CALIBRATED OPERATING SEED]
  heated_air_flow: 80.0       # kg/s [CALIBRATED OPERATING SEED] DRYER
  ambient_air_flow: 250.0     # kg/s [CALIBRATED OPERATING SEED] COOLER
                              # within 10 K of ambient (~32 C). The CL1 rpm rate-limit (above) sets the
                              # product MOISTURE (~11%); air flow only sets the temperature.
  # M3a follow-up ("C"): HOT, live-tunable from the UI/OPC UA while RUNNING
  # (RuntimeFacade.set_dt_resolve_interval_s) -- schema-enforced floor of
  # 120s (config/schema.py's OperatingDefaults.dt_resolve_interval_s): the
  # DT's own dynamics (~20-30 min residence) don't meaningfully change faster
  # than this, so resolving more often buys nothing physically, only
  # wall-clock cost. At the floor + this scenario's speed_factor=20, the
  # wall-clock gap is 120/20=6s -- ~2x margin over the ~3s solve cost
  # measured with the M3a follow-up ("A2") tuning above.
  dt_resolve_interval_s: 120.0   # s, SIM time

# --------------------------------------------------- disturbance defaults (HOT seeds)
# Feed conditions to the DT — live-adjustable (UI sliders / OPC UA), no
# MANUAL/AUTO mode (§5.2 DV). Defaults are the named COAMO benchmark on the
# dry-defatted-meal basis used by scripts/calibration_scorecard.py.
disturbance_defaults:
  feed_temperature: 322.15    # K = 49 C        [PAPER/COAMO]
  feed_moisture: 0.124        # kg/kg dry solid [PAPER/COAMO]
  feed_hexane:   0.388        # kg/kg dry solid [PAPER/COAMO]
  feed_oil:      0.0137       # kg/kg dry solid [PAPER/COAMO]
  ambient_air_temp: 298.0     # K [DISTURBANCE SEED] replace with measured weather
  ambient_relative_humidity: 0.50  # 0-1 [DISTURBANCE SEED] replace with measured weather

# ------------------------------------------------------------------ simulation
sim:
  # 20x: a real DT's ~20-30 min residence (base_residence_s above) would take that many real
  # minutes to watch settle at 1x. 20x brings the full transient to ~60-90 real seconds while
  # staying under the undersample constraint below (20*0.2=4.0 <= 10.0). Set to 1.0 for real-time.
  speed_factor: 20.0
  dt_wall_s: 0.2              # [NUMERICAL/RUNTIME] wall tick
  max_control_interval_s: 10.0 # [NUMERICAL/RUNTIME] set to <= APC sample time
  clock: realtime             # realtime | freerun

# ------------------------------------------------------------- validation targets
# Expected qualitative behavior to check against, not inputs. Coletto (2022) DCZ-only figures kept
# alongside whole-tower literature figures (see app_specifications/DTDC_steady_state_reference.md
# for sources) — the two are at different scales (one particle-scale zone vs. the full DT+DC).
#   [Coletto 2022, DCZ only]  residual hexane:  DCZ inlet ~4000 ppm  ->  outlet ~100 ppm
#   [Coletto 2022, DCZ only]  FTRZ thickness:    order of cm (< a few cm)
#   [literature, whole tower] PREDESOLV->MAIN:   meal warms toward hexane bp (68.7 C) conductively
#   [literature, whole tower] MAIN exit:         ~100 C, moisture 17-22%
#   [literature, whole tower] DT exit (post-SP1): ~105-110 C, moisture 18-22%, hexane <500-800 ppm
#   [literature, whole tower] DRYER exit:        moisture ~13%
#   [literature, whole tower] COOLER exit:       ~35-40 C, moisture ~11-12.5%, hexane <300-500 ppm
#   [EPA AP-42 9.11.1 Table 4-4, real US soybean plants] MEAL HEXANE cascade (avg; range 110-650):
#       DT (desolventizer-toaster) exit ~507 ppm  ->  dryer exit ~397 ppm  ->  cooler/product ~323 ppm
#       (high-feed plants sit higher, e.g. plant F: DT 1380 -> product 440 ppm)
#   [Naiha & Roques 1983] hexane intraparticle diffusion in DRY meal: D/a² ~3e-8..4.4e-6 /s (40-105 C),
#       activation energy E=80 kJ/mol (STATIC diffusion; the real agitated DC is milder, EPA effective ~20)
