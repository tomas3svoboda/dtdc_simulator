# DTDC Simulator — first-estimate scenario (soybean base case)
# Companion to DTDC_Simulator_BuildSpec.md. Units are SI.
#
# Material physical properties (GAB isotherm, latent heats, densities, ...)
# live in properties/soybean.yaml (BuildSpec §11: "one file per material
# property set under properties/"), resolved automatically from `material:`
# below. This file binds that property set to geometry + model params +
# operating/disturbance defaults + sim config, per §11's scenario-file shape.
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]  taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]  order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]    standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870   -> geometry, base operating point, C0/C1, correlations

material: soybean

# ------------------------------------------------------------------ geometry
# Simplified from Coletto's own 6-tray base case (3 pre-desolv + 2 main + 1 sparge) to
# 2 PREDESOLV + 1 MAIN + 1 SPARGE for faster iteration (DECIDE, this phase). PD3's and
# MN2's indirect duty was folded into the remaining PREDESOLV/MAIN trays below (not just
# dropped) so PHZ still reaches X2_cr before running out of trays -- see the retuned
# indirect_steam values' own comments.
# DC (dryer/cooler) stages appended (not in Coletto) as first-estimate.
geometry:
  stages:
    # Real DTDC tower geometry: ~6 m diameter, and the PACKED bed depths differ by role --
    # PREDESOLV trays run SHALLOW (~15 cm, fast surface-flash desolventizing), TOASTING
    # (MAIN/SPARGE) trays run DEEP (~60-100 cm, long moist-heat contact). NB the physical
    # vessel is ~20 m tall, but that is mostly inter-tray VAPOR headspace, which this model
    # does NOT resolve -- only the packed solid beds are modeled, summing to ~1.9 m here
    # (the "packed bed total height" the meal-bed profile shows). Per-tray indirect_steam is
    # retuned below so PD1/PD2 actually reach hexane bp (~69 C) and desolventize, not just heat.
    - {id: PD1, role: PREDESOLV, diameter_m: 6.0, bed_height_m: 0.15}   # shallow predesolv (feed)
    - {id: PD2, role: PREDESOLV, diameter_m: 6.0, bed_height_m: 0.15}   # shallow predesolv
    - {id: MN1, role: MAIN,      diameter_m: 6.0, bed_height_m: 1.00}   # deep toasting (FTRZ/DCZ here)
    - {id: SP1, role: SPARGE,    diameter_m: 6.0, bed_height_m: 0.60}   # deep sparge (direct steam)
    # DR1/CL1 sized so the bed-holdup mass balance (added alongside gate_opening
    # becoming a real MV) settles at ~65% level at default gate/sweep settings,
    # leaving headroom before a narrowed gate genuinely floods the tray.
    - {id: DR1, role: DRYER,     diameter_m: 4.0, bed_height_m: 0.60}   # [PLACE]
    - {id: CL1, role: COOLER,    diameter_m: 4.0, bed_height_m: 0.60}   # [PLACE]

# ------------------------------------------------------------------ model params
model:
  D_eff: 4.0e-10               # m2/s  [PAPER] Cardarelli, Crapiste & Mattea (2002) Table 1, exact cited value
  D_ax:  1.022e-3              # m2/s  [PAPER] Coletto supp. Table 1, "Hexane axial diffusivity" (Cardarelli 1998)
  n_particle_layers: 12       # -     [PAPER] Coletto uses 12 spherical FVM shells
  nz_per_zone: 20             # -     [PLACE] axial cells per zone per tray
  D_HW: 1.33e-5              # m2/s  [PAPER] Coletto supp. Table 1, "Hexane-water molecular diffusivity" (Cardarelli 1998)
  htc_correlation: {form: faner, c: 0.6949, m: 0.579, n: 0.3333}  # [PAPER] Nu=0.6949 Re^0.579 Pr^(1/3) (B.7)
  # DT fixed-point sweep controls (§7.8)
  outer_relaxation: 0.5       # [PLACE] under-relaxation
  outer_tol: 1.0e-5           # [PLACE]
  outer_max_iter: 100         # [PLACE]
  # Retuned this session, empirically, once wired into bed_transport_coefficients (previously
  # declared but never connected to anything -- confirmed by a repo-wide search before this
  # fix): a real DT bed is continuously mechanically swept/agitated, a fundamentally stronger
  # heat/mass-transfer regime than the passive Nu-Re packed-bed correlation alone predicts.
  # gain=1.0 (form: hQ *= 1 + gain*rpm^2) lands DCZ's converged temperature in its own
  # validated ~380-383 K band (vs ~390-410 K unwired/under-tuned) -- see DECISIONS.md.
  sweep_arm_transfer_gain: 1.0   # [PLACE] hQ/hM sensitivity to sweep-arm agitation (empirically retuned)
  # M3a (BuildSpec §7.9): DT-role stage equilibrium targets now come from the
  # real core/dt_solver.py::solve_dt() zonal solve (PHZ/FTRZ/DCZ), re-run on
  # the periodic cadence below — no more fitted "duty saturation curve";
  # driven by the real dH_vap/T_boil/GAB-isotherm/particle physics in
  # properties/soybean.yaml plus the D_eff/D_ax/htc_correlation/etc. above.
  base_residence_s: 90.0      # s  [PLACE] nominal per-stage lag time constant at reference sweep
                              #    speed (3 rpm) and gate opening (50%). Cascaded across 8 stages this
                              #    settles in ~20-40 simulated minutes, in line with a real DT's
                              #    ~20-30 min total residence — see sim.speed_factor below for why
                              #    that's still practical to watch interactively.
  # DT solve scheduling (M3a, §7.9): solve_dt() is NOT re-run every 0.2s tick;
  # only every dt_resolve_interval_s of SIM time (that value is now a HOT,
  # live-tunable seed in operating_defaults below, not here -- see its own
  # comment there for the wall-clock-gap math).
  dt_nz_phz: 10                  # -  [PLACE] real-time PHZ mesh, coarser than a validation run's nz_per_zone
  dt_nz_ftrz: 10                 # -  [PLACE] real-time FTRZ mesh
  dt_nz_dcz: 8                   # -  [PLACE] real-time DCZ mesh (verified to stay converged/monotonic)
  # DT bottom vapor boundary (documented simplification, same category as
  # dt_solver.py's own sparge-BC assumption): "clean" vapor arriving below the
  # bottommost DT tray (rotary lock / DC side), before SP1's own direct steam
  # mixes in. No real DC->DT vapor-return stream is modeled at this fidelity.
  dt_vapor_feed_water_kg_s: 5.0   # kg/s  [PLACE]
  dt_vapor_feed_hex_kg_s: 0.0005  # kg/s  [PLACE]
  dt_vapor_feed_T: 371.0          # K     [PLACE]
  # Retuned from an initial 0.3 placeholder (DECIDE, this session): recalibrating
  # ambient_air_flow/heated_air_flow against a real DTDC SCADA reference screen (a
  # "311 TOASTER" HMI, user-provided) surfaced that residual hexane at the old flow+k
  # combination sat ~11,800 ppm at steady state -- far above the ~1000 ppm ceiling the
  # user set as a hard requirement for finished meal. Retuned jointly with the air flow
  # recalibration below (see operating_defaults' own comments) to land comfortably under
  # that ceiling (~115-120 ppm at the base case, confirmed robust across a stress test
  # sweep -- reduced indirect steam duty, narrower discharge gates -- since DC's own
  # stripping dominates whatever concentration arrives from the DT). Still [PLACE]: no
  # literature source calibrates this rate constant, only the ppm ceiling it must satisfy.
  dc_hexane_strip_k: 1.0          # -  [PLACE, RETUNED] core/dc.py residual-hexane air-stripping rate constant
  # SPARGE (direct) steam supply pressure -- found this session: the model previously mixed
  # direct_steam in at water's ATMOSPHERIC boiling point (~373 K), but that's the DT vessel's
  # own internal vapor-space reference, not the steam SUPPLY temperature. This project's own
  # literature_sources/Svoboda_Case_for_Advanced_Process_Control_VRX-DTDC_Concept.pdf documents
  # indirect steam at 9.5 barG (~185 C) but not direct/sparge steam's own pressure. First guess
  # (3 barG/144 C) was revised after the user's own more detailed operational knowledge: real
  # sparge steam is LOW pressure, ~0.5-1.5 bar / 100-110 C saturated -- 0.3 barG (~107.5 C) is
  # the middle of that range via the same antoine_water correlation used for T_boil_water.
  direct_steam_pressure_barg: 0.3 # bar  [PAPER-adjacent, user-confirmed plant practice, revised]
  # DT solve convergence tuning (M3a follow-up, "A2") -- deliberately looser
  # than solve_dt()'s own validation-run defaults (outer_tol=1e-5, both
  # iteration caps=100), profiled+measured this session: dt_solver's own
  # FTRZ<->DCZ outer-loop convergence check applies the same absolute
  # tolerance to a Kelvin-scale quantity (T, ~300-450) and a mass-fraction
  # quantity (wV2, ~0.0005) -- traced directly, wV2 converges by iteration ~5
  # while T is still creeping by <0.001%/iteration at iteration 50+. At these
  # settings: ~3s per solve_dt call (combined with the sorption-heat-source
  # dedup fix, core/zones/particle.py), vs ~10-14s at the tight defaults, for
  # a ~0.7 K / ~2 ppm difference in the converged answer -- negligible next
  # to hQ/hM/aV's own already-flagged [DERIVED]/[PLACE] uncertainty. See
  # DECISIONS.md's M3a follow-up entry for the full measured comparison.
  dt_outer_tol: 0.05             # -  [PLACE] real-time FTRZ<->DCZ outer-loop tolerance
  dt_outer_max_iter: 20          # -  [PLACE] real-time FTRZ<->DCZ outer-loop cap
  dt_dcz_inner_max_iter: 100     # -  [PLACE] DCZ's own inner Gauss-Seidel cap (unchanged from M2 Phase 4's own default)

# ---------------------------------------------------- operating defaults (HOT seeds)
# Coletto base case direction: feed ~26% solvent, ~35% at rotary lock; steam split DT.
operating_defaults:
  feed_flow_rate: 25.0        # kg/s dry solid  [PLACE] (scale to your throughput)
  # PD1/PD2 raised to 2.5e6 W each so the PREDESOLV section can strip feed hexane down to the
  # measured critical content X_c ~0.20 (properties/soybean.yaml, Faner 2019) by surface
  # evaporation -- i.e. the predesolventizer does the bulk of the desolventizing, as it does in
  # a real DT. (At the old 9.0e5, the PHZ could only reach ~0.36 by surface evaporation, which
  # was fine when X_c was the theoretical ~0.43 but leaves the meal above the real 0.20.) With
  # 2.5e6 the flash front sits in PD2 and the DT exits ~1000 ppm hexane at ~100 C. MN1 (toasting)
  # + SP1 (sparge) then finish the residual via the receding front + DCZ diffusion.
  indirect_steam:             # W per DT tray (jacket duty)  [PLACE]
    PD1: 2.5e6
    PD2: 2.5e6
    MN1: 2.0e6
    SP1: 4.0e5
  direct_steam:               # kg/s sparge steam  [PLACE]
    SP1: 1.5
  sweep_arm_speed:            # rpm  [PLACE] central-shaft sweep/rake arms (NOT agitation)
    PD1: 3.0
    PD2: 3.0
    MN1: 3.0
    SP1: 3.0
  gate_opening:               # 0-100 % level/discharge gate per stage  [PLACE]
    PD1: 50
    PD2: 50
    MN1: 50
    SP1: 50
  # heated_air_flow/ambient_air_flow — recalibrated against the first-principles DC rewrite
  # (core/dc.py, Luz 2010 / Silva 2012) AND the flake particle_radius fix (properties/soybean.yaml),
  # which raised the DT exit moisture into the realistic 18-24% band. The DC is a closed two-sided
  # mass/energy balance with COUPLED air-solid heat transfer, so both air rates set a genuine
  # thermodynamic duty:
  #  * DRYER (heated_air_flow=60): meal enters ~100 C / ~24% moisture; evaporating that much water
  #    carries latent heat away, so DR1 settles ~53 C (NOT held at air temperature) while shedding
  #    moisture to ~12% -- correct evaporative-drying physics, and matches the real 311 SUSIC
  #    (~50 C) dryer-outlet reading.
  #  * COOLER (ambient_air_flow=55): DR1 already did most of the cooling (evaporatively), so the
  #    cooler only drops ~53 C -> ~37 C, matching the SCADA CHLADIC reference (~38.5 C) at a normal
  #    ~2:1 air:solid ratio. (Before the flake/moisture fix the dryer left the meal hot ~85 C and
  #    the cooler needed ~400 kg/s; the realistic moisture regime made that unnecessary.)
  heated_air_temp: 380.0      # K  [PLACE] dryer inlet air
  heated_air_flow: 60.0       # kg/s  [PLACE, RETUNED] DRYER — DR1 ~53 C while drying ~24%->~12%
  ambient_air_flow: 55.0      # kg/s  [PLACE, RETUNED] COOLER — ~2:1 air:solid, CL1 ~37 C
  # M3a follow-up ("C"): HOT, live-tunable from the UI/OPC UA while RUNNING
  # (RuntimeFacade.set_dt_resolve_interval_s) -- schema-enforced floor of
  # 120s (config/schema.py's OperatingDefaults.dt_resolve_interval_s): the
  # DT's own dynamics (~20-30 min residence) don't meaningfully change faster
  # than this, so resolving more often buys nothing physically, only
  # wall-clock cost. At the floor + this scenario's speed_factor=20, the
  # wall-clock gap is 120/20=6s -- ~2x margin over the ~3s solve cost
  # measured with the M3a follow-up ("A2") tuning above.
  dt_resolve_interval_s: 120.0   # s, SIM time

# --------------------------------------------------- disturbance defaults (HOT seeds)
# Feed conditions to the DT — live-adjustable (UI sliders / OPC UA), no MANUAL/AUTO mode (§5.2 DV).
# Literature range for wet desolventized flakes entering the DT (see
# app_specifications/DTDC_steady_state_reference.md): ~25-35% residual hexane, ~5-10% moisture,
# ~55-60 C. Defaults below sit mid-range; UI sliders span 10-50% hexane, 5-25% moisture, 40-80 C.
disturbance_defaults:
  feed_temperature: 330.0     # K = 56.85 C  [PAPER] meal from extractor ~55-60 C
  feed_moisture: 0.07         # kg/kg dry solid  [PAPER] ~5-10% incoming (was 0.12, too high vs lit.)
  # Set to 35% hexane by TOTAL WET mass (industry convention: mass hexane / mass wet meal,
  # where wet = dry solid + moisture + oil + hexane). Per kg dry solid the non-hexane mass is
  # 1 + X1 + X3 = 1.08, so 35% wet -> X2 = 0.35*1.08/(1-0.35) = 0.5815 dry-basis. This stays
  # comfortably ABOVE X2,cr (~0.42, the pore-saturation threshold below which the PHZ pre-heat
  # zone collapses), so desolventizing is physical. NB the GUI feed card shows this back as a
  # wet-mass fraction (~35%), not the dry-basis 0.58 -- see interfaces/ui/tower.py.
  feed_hexane:   0.5815        # kg/kg dry solid = 35% hexane by total wet mass [PAPER-adjacent]
  ambient_air_temp: 298.0     # K  [PLACE] cooler inlet air -- weather, not an operator setpoint
  ambient_relative_humidity: 0.50  # 0-1  [PLACE] ~50% RH at 298K -- matches the old 0.010 kg/kg default

# ------------------------------------------------------------------ simulation
sim:
  # 20x: a real DT's ~20-30 min residence (base_residence_s above) would take that many real
  # minutes to watch settle at 1x. 20x brings the full transient to ~60-90 real seconds while
  # staying under the undersample constraint below (20*0.2=4.0 <= 10.0). Set to 1.0 for real-time.
  speed_factor: 20.0
  dt_wall_s: 0.2              # [PLACE] wall tick (keep small; see §8.4 undersampling)
  max_control_interval_s: 10.0 # [PLACE] set to <= your APC sample time
  clock: realtime             # realtime | freerun

# ------------------------------------------------------------- validation targets
# Expected qualitative behavior to check against, not inputs. Coletto (2022) DCZ-only figures kept
# alongside whole-tower literature figures (see app_specifications/DTDC_steady_state_reference.md
# for sources) — the two are at different scales (one particle-scale zone vs. the full DT+DC).
#   [Coletto 2022, DCZ only]  residual hexane:  DCZ inlet ~4000 ppm  ->  outlet ~100 ppm
#   [Coletto 2022, DCZ only]  FTRZ thickness:    order of cm (< a few cm)
#   [literature, whole tower] PREDESOLV->MAIN:   meal warms toward hexane bp (68.7 C) conductively
#   [literature, whole tower] MAIN exit:         ~100 C, moisture 17-22%
#   [literature, whole tower] DT exit (post-SP1): ~105-110 C, moisture 18-22%, hexane <500-800 ppm
#   [literature, whole tower] DRYER exit:        moisture ~13%
#   [literature, whole tower] COOLER exit:       ~35-40 C, moisture ~11-12.5%, hexane <300-500 ppm
