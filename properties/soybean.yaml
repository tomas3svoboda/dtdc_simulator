# Soybean material property set — BuildSpec §11: "one file per material
# property set under properties/". Referenced by a scenario file's top-level
# `material: soybean` key (dtdc_simulator.config.loader resolves
# properties/<material>.yaml automatically when a scenario has no inline
# `physical:` block).
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]  taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]  order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]    standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870   -> geometry, base operating point, correlations
#   Cardarelli & Crapiste (1996) JAOCS 73(12) 1657-1661         -> GAB isotherm (Table 2, soybean, exact)
#   Cardarelli, Crapiste & Mattea (2002) J. Food Eng. 52, 127   -> Table 1: rho_solid, porosities, D_eff,
#                                                                   particle radius, vapor viscosity (exact)
# NOTE: the oil-in-hexane power law (A0/B) and the heat-of-sorption constants (sorption_C0/C1) are cited
#       by Coletto (2022) to two unpublished PhD theses (Cardarelli 1998; Faner 2008) not available to
#       us — no source we have states their fitted values. Tagged [PLACE] (order-of-magnitude, NOT fit to
#       data) until/unless those theses (or another source stating the fitted numbers) surface.

material_name: soybean

# latent heats
dH_vap_hexane: 3.34e5        # J/kg  [STD] n-hexane at bp
dH_vap_water:  2.26e6        # J/kg  [STD] water at 100 C
T_boil_hexane: 341.9         # K     [STD] 68.7 C at 1 atm
# densities
rho_solid:   1513.0          # kg/m3 [PAPER] Cardarelli, Crapiste & Mattea (2002) Table 1
rho_ps:      1513.0          # kg/m3 [PAPER] particle solid-phase density, same source/value
rho_vapor_ref: 0.6           # kg/m3 [DERIVED] steam/hexane mix near 1 atm, ~373 K
rho_hexane_liquid_ref: 615.0 # kg/m3 [DERIVED] Daubert-Danner B.11-B.12 near bp
# specific heats
cp_solid:        1800.0      # J/kgK [PLACE] dry oilseed meal
cp_vapor:        2000.0      # J/kgK [PLACE] steam/hexane vapor mix (legacy mean, superseded by the two below)
cp_water_liquid: 4186.0      # J/kgK [STD]
cp_water_vapor:  1900.0      # J/kgK [STD] steam, ~370 K (B.6 CPVip)
cp_hexane_vapor: 1650.0      # J/kgK [STD] n-hexane gas, ~340-370 K (B.6 CPVip)
cp_hexane_liquid: 2260.0     # J/kgK [STD] liquid n-hexane, ~25-70 C (B.5 CPL)
cp_oil:          2000.0      # J/kgK [PLACE] soybean oil
mu_vapor:        1.3e-5      # Pa.s  [PAPER] Cardarelli, Crapiste & Mattea (2002) Table 1
# porosity / volume fractions
bed_porosity:      0.40      # -     [PAPER] eps_b, Cardarelli, Crapiste & Mattea (2002) Table 1 ("void fraction in the bed")
particle_porosity: 0.50      # -     [PAPER] eps_p, same source ("particle porosity")
alpha_ps:          0.50      # -     [DERIVED] particle solid volume fraction (=1-eps_p)
alpha_pg:          0.50      # -     [DERIVED] particle pore-gas volume fraction (=eps_p)
particle_radius:   1.0e-3    # m     [PAPER] rP, same source ("particle diameter" 2.0e-3 m / 2)
oil_fraction:      0.01      # kg/kg [PAPER-ish] residual oil in meal (X3), ~1% after extraction
# heat of sorption  dH_s = dH_lv2 + C0 * W2^C1   (A.31)
sorption_C0: 3.0e5           # [PLACE] no source available (see note above); order-of-magnitude only
sorption_C1: -0.5            # [PLACE] no source available (see note above); order-of-magnitude only
# GAB isotherm (solid-phase hexane), W2_eq = GAB(ah,T) — Cardarelli & Crapiste (1996) Table 2, soybean,
# converted from their Hm [g hexane/100 g dry meal] to Xm [kg/kg dry solid] (Hm/100)
gab_params:
  Xm: 5.183e-3      # [PAPER] = 0.5183 g/100g dm
  C0: 3.117e-3      # [PAPER]
  dHC_R: 2262.0     # [PAPER] K, delta_H_C/R
  K0: 9.172e-2      # [PAPER]
  dHK_R: 729.6      # [PAPER] K, delta_H_K/R
# hexane-in-oil power law  qo = A0 * ah^B   (eq. 7, oil basis)
oil_isotherm: {A0: 0.8, B: 1.0}   # [PLACE] no source available (see note above); order-of-magnitude only
# Antoine (log10 P[bar] = A - B/(C+T[K])) — support for VLLE/dew point
antoine_hexane: {A: 4.00266, B: 1171.53, C: -48.784}   # [STD] NIST n-hexane
antoine_water:  {A: 5.11564, B: 1687.54, C: -42.98}    # [STD] NIST water
