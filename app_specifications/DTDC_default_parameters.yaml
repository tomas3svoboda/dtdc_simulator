# DTDC Simulator — first-estimate parameters (soybean base case)
# Companion to DTDC_Simulator_BuildSpec.md. Units are SI.
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]  taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]  order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]    standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870   -> geometry, base operating point, C0/C1, correlations
#   Cardarelli & Crapiste (1996) JAOCS 73(12) 1657              -> GAB isotherm + oil power-law structure (soybean)
#   Cardarelli, Crapiste & Mattea (2002) J. Food Eng. 52, 127   -> DCZ dual-scale basis, D_eff/D_ax ranges
#   Chen et al. (2014) Food Chem. 154, 108                      -> protein denaturation Arrhenius basis
# NOTE: several isotherm/kinetic coefficients are not printed as plain numbers in the
#       sources; those are tagged [PLACE] and MUST be fitted to the source curves/tables.

material: soybean

# ------------------------------------------------------------------ geometry
# Coletto base case: 6 trays x 4 m dia; 3 pre-desolv (0.3 m), tray4 1.0 m, trays5-6 0.6 m.
# DC (dryer/cooler) stages appended (not in Coletto) as first-estimate.
geometry:
  stages:
    - {id: PD1, role: PREDESOLV, diameter_m: 4.0, bed_height_m: 0.30}   # [PAPER]
    - {id: PD2, role: PREDESOLV, diameter_m: 4.0, bed_height_m: 0.30}   # [PAPER]
    - {id: PD3, role: PREDESOLV, diameter_m: 4.0, bed_height_m: 0.30}   # [PAPER]
    - {id: MN1, role: MAIN,      diameter_m: 4.0, bed_height_m: 1.00}   # [PAPER] tray4 (FTRZ starts here)
    - {id: MN2, role: MAIN,      diameter_m: 4.0, bed_height_m: 0.60}   # [PAPER] tray5
    - {id: SP1, role: SPARGE,    diameter_m: 4.0, bed_height_m: 0.60}   # [PAPER] tray6 (direct steam)
    - {id: DR1, role: DRYER,     diameter_m: 3.0, bed_height_m: 0.50}   # [PLACE]
    - {id: CL1, role: COOLER,    diameter_m: 3.0, bed_height_m: 0.50}   # [PLACE]

# --------------------------------------------------------------- physical params
physical:
  # latent heats
  dH_vap_hexane: 3.34e5        # J/kg  [STD] n-hexane at bp
  dH_vap_water:  2.26e6        # J/kg  [STD] water at 100 C
  T_boil_hexane: 341.9         # K     [STD] 68.7 C at 1 atm
  # densities
  rho_solid:   1250.0          # kg/m3 [PLACE] dry meal solids
  rho_ps:      1250.0          # kg/m3 [PLACE] particle solid-phase density
  rho_vapor_ref: 0.6           # kg/m3 [DERIVED] steam/hexane mix near 1 atm, ~373 K
  rho_hexane_liquid_ref: 615.0 # kg/m3 [DERIVED] Daubert-Danner B.11-B.12 near bp
  # specific heats
  cp_solid:        1800.0      # J/kgK [PLACE] dry oilseed meal
  cp_vapor:        2000.0      # J/kgK [PLACE] steam/hexane vapor mix
  cp_water_liquid: 4186.0      # J/kgK [STD]
  cp_oil:          2000.0      # J/kgK [PLACE] soybean oil
  # porosity / volume fractions
  bed_porosity:      0.45      # -     [PLACE] eps_b
  particle_porosity: 0.40      # -     [PLACE] eps_p
  alpha_ps:          0.55      # -     [PLACE] particle solid volume fraction (=1-eps_p)
  alpha_pg:          0.40      # -     [PLACE] particle pore-gas volume fraction
  particle_radius:   1.5e-3    # m     [PLACE] rP (flake/collet effective radius)
  oil_fraction:      0.01      # kg/kg [PAPER-ish] residual oil in meal (X3), ~1% after extraction
  # heat of sorption  dH_s = dH_lv2 + C0 * W2^C1   (A.31)
  sorption_C0: 3.0e5           # [PLACE] soybean; fit to Cardarelli 1998 / Faner 2008
  sorption_C1: -0.5            # [PLACE] soybean; fit to source
  # GAB isotherm (solid-phase hexane), W2_eq = GAB(ah,T)  — fit to Cardarelli&Crapiste 1996 soybean
  gab_params: {Xm: 0.05, C: 10.0, K: 0.9, temp_dependence: linear}   # [PLACE] all — FIT REQUIRED
  # hexane-in-oil power law  qo = A0 * ah^B   (eq. 7, oil basis)
  oil_isotherm: {A0: 0.8, B: 1.0}   # [PLACE] fit to Cardarelli&Crapiste 1996
  # Antoine (log10 P[bar] = A - B/(C+T[K])) — support for VLLE/dew point
  antoine_hexane: {A: 4.00266, B: 1171.53, C: -48.784}   # [STD] NIST n-hexane
  antoine_water:  {A: 5.11564, B: 1687.54, C: -42.98}    # [STD] NIST water

# ------------------------------------------------------------------ model params
model:
  D_eff: 1.0e-9               # m2/s  [PLACE] intraparticle hexane diffusivity (Cardarelli 2002 range 1e-10..1e-8)
  D_ax:  1.0e-4               # m2/s  [PLACE] axial dispersion (bed scale)
  n_particle_layers: 12       # -     [PAPER] Coletto uses 12 spherical FVM shells
  nz_per_zone: 20             # -     [PLACE] axial cells per zone per tray
  D_HW: 1.0e-5               # m2/s  [PLACE] hexane-water gas diffusivity for Schmidt no. (B.10)
  htc_correlation: {form: faner, c: 0.6949, m: 0.579, n: 0.3333}  # [PAPER] Nu=0.6949 Re^0.579 Pr^(1/3) (B.7)
  # DT fixed-point sweep controls (§7.8)
  outer_relaxation: 0.5       # [PLACE] under-relaxation
  outer_tol: 1.0e-5           # [PLACE]
  outer_max_iter: 100         # [PLACE]
  # Protein denaturation (Chen 2014 basis) — Arrhenius
  denat_k0: 1.0e12           # 1/s   [PLACE]
  denat_Ea: 1.1e5            # J/mol [PLACE] ~110 kJ/mol (protein/lysine sensitive)
  denat_moisture_cap: 0.30    # kg/kg [PAPER] moisture influence saturates ~0.30
  sweep_arm_transfer_gain: 0.2   # [PLACE] hQ/hM sensitivity to sweep-arm speed (renamed from agitator)

# ---------------------------------------------------- operating defaults (HOT seeds)
# Coletto base case direction: feed ~26% solvent, ~35% at rotary lock; steam split DT.
operating_defaults:
  feed_flow_rate: 25.0        # kg/s dry solid  [PLACE] (scale to your throughput)
  feed_temperature: 330.0     # K  [PLACE] meal from extractor ~57 C
  indirect_steam:             # W per DT tray (jacket duty)  [PLACE]
    PD1: 4.0e5
    PD2: 4.0e5
    PD3: 4.0e5
    MN1: 1.2e6
    MN2: 8.0e5
    SP1: 4.0e5
  direct_steam:               # kg/s sparge steam  [PLACE]
    SP1: 1.5
  sweep_arm_speed:            # rpm  [PLACE] central-shaft sweep/rake arms (NOT agitation)
    PD1: 3.0
    PD2: 3.0
    PD3: 3.0
    MN1: 3.0
    MN2: 3.0
    SP1: 3.0
  gate_opening:               # 0-100 % level/discharge gate per stage  [PLACE]
    PD1: 50
    PD2: 50
    PD3: 50
    MN1: 50
    MN2: 50
    SP1: 50
  heated_air_temp: 380.0      # K  [PLACE] dryer inlet air
  heated_air_flow: 5.0        # kg/s  [PLACE]
  ambient_air_temp: 298.0     # K  [PLACE] cooler inlet air
  ambient_air_flow: 8.0       # kg/s  [PLACE]

# --------------------------------------------------- disturbance defaults (HOT seeds)
disturbance_defaults:
  feed_moisture: 0.12         # kg/kg dry solid  [PAPER-ish] ~12% incoming
  feed_hexane:   0.26         # kg/kg dry solid  [PAPER] ~26% solvent entering DT
  ambient_temp:  298.0        # K  [PLACE]
  ambient_humidity: 0.010     # kg/kg  [PLACE]

# ------------------------------------------------------------------ simulation
sim:
  speed_factor: 1.0           # 1x real time
  dt_wall_s: 0.2              # [PLACE] wall tick (keep small; see §8.4 undersampling)
  max_control_interval_s: 10.0 # [PLACE] set to <= your APC sample time
  clock: realtime             # realtime | freerun

# ------------------------------------------------------------- validation targets
# Expected qualitative behavior to check against (Coletto 2022), not inputs:
#   residual hexane in meal:  DCZ inlet ~4000 ppm  ->  outlet ~100 ppm
#   FTRZ thickness:           order of cm (< a few cm)
#   meal moisture after DC:   < ~12 %
#   protein solubility (KOH):  ~78-85 % (drops <70-72% if over-processed)
