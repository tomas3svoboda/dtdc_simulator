# DTDC Simulator — parameter reference (soybean base case)
# Companion to DTDC_Simulator_BuildSpec.md. Units are SI.
#
# This file MIRRORS the tuned active configuration -- it is a flattened, condensed
# snapshot of scenarios/soybean_default.yaml (geometry/model/operating/disturbance/sim)
# + properties/soybean.yaml (physical). Those two files are AUTHORITATIVE and carry the
# full per-value rationale; keep this reference in sync when they change. Not loaded by
# any code (docs only).
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]   taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]   order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]     standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870 (+ supp.)  -> correlations, cp/mu/k, D_ax/D_HW, oil isotherm
#   Cardarelli & Crapiste (1996) JAOCS 73(12) 1657                        -> GAB isotherm (soybean, exact)
#   Cardarelli, Crapiste & Mattea (2002) J. Food Eng. 52, 127            -> rho_solid, porosities, D_eff, particle radius
#   Faner, Perez & Crapiste (2019)                                        -> critical solvent content x2_critical, Nu-Re
#   Gianini/Luz et al. (2006) / Luz et al. (2010)                        -> water desorption + air-drying correlations
#   Touffet et al. (2026)                                                 -> water intraparticle diffusivity (derated)
#   Kemper / AOCS Lipid Library (2019)                                    -> tray depths, dome temperature, sparge steam

material: soybean

# ------------------------------------------------------------------ geometry
# DT: Coletto six-tray arrangement, diameter throughput-scaled from 4 m at
# 11.9 kg/s dry feed to the industrial 6 m shell at 25 kg/s. Depths are
# maximum holdup capacity; nominal 50% fill reproduces Coletto's loaded
# 0.3/0.3/0.3/1.0/0.6/0.75 m beds; the sparge inventory closes the
# >=20 min hot-contact residence gate while remaining in its industrial range.
geometry:
  stages:
    - {id: PD1, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}   # 0.3 m loaded
    - {id: PD2, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}   # 0.3 m loaded
    - {id: PD3, role: PREDESOLV, vapor_path: BYPASS, diameter_m: 6.0, bed_height_m: 0.60}   # 0.3 m loaded
    - {id: MN1, role: MAIN,      vapor_path: THROUGH_BED, diameter_m: 6.0, bed_height_m: 2.00}   # 1.0 m loaded
    - {id: MN2, role: MAIN,      vapor_path: THROUGH_BED, diameter_m: 6.0, bed_height_m: 1.20}   # 0.6 m loaded
    - {id: SP1, role: SPARGE,    vapor_path: STEAM_SOURCE, diameter_m: 6.0, bed_height_m: 1.50}   # 0.75 m loaded
    - {id: DR1, role: DRYER,     diameter_m: 4.0, bed_height_m: 0.60, arm_mixing_factor: 1.07}   # [CALIBRATED CLOSURE]
    - {id: CL1, role: COOLER,    diameter_m: 4.0, bed_height_m: 0.60, arm_mixing_factor: 0.69}   # [CALIBRATED CLOSURE]

topology:
  solid_transfers:
    - {id: PD1_TO_PD2, from_stage: PD1, to_stage: PD2, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: PD2_TO_PD3, from_stage: PD2, to_stage: PD3, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: PD3_TO_MN1, from_stage: PD3, to_stage: MN1, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: MN1_TO_MN2, from_stage: MN1, to_stage: MN2, device_type: CONTROLLED_GATE, controlled: true}
    - {id: MN2_TO_SP1, from_stage: MN2, to_stage: SP1, device_type: CONTROLLED_GATE, controlled: true}
    - {id: SP1_TO_DR1, from_stage: SP1, to_stage: DR1, device_type: ROTARY_AIRLOCK, controlled: true, vapor_seal: true}
    - {id: DR1_TO_CL1, from_stage: DR1, to_stage: CL1, device_type: PASSIVE_SWEPT_PORT, fixed_position_pct: 50}
    - {id: CL1_PRODUCT, from_stage: CL1, to_stage: null, device_type: ROTARY_AIRLOCK, controlled: true, vapor_seal: true}

# --------------------------------------------------------------- physical params
# Mirrors properties/soybean.yaml (authoritative).
physical:
  dH_vap_hexane: 3.34e5        # J/kg  [STD] n-hexane at bp
  dH_vap_water:  2.26e6        # J/kg  [STD] water at 100 C
  T_boil_hexane: 341.9         # K     [STD] 68.7 C at 1 atm
  rho_solid:   1513.0          # kg/m3 [PAPER] Cardarelli et al. (2002) Table 1
  rho_ps:      1513.0          # kg/m3 [PAPER] particle solid-phase density
  rho_vapor_ref: 0.6           # kg/m3 [DERIVED] steam/hexane mix near 1 atm, ~373 K
  rho_hexane_liquid_ref: 615.0 # kg/m3 [DERIVED] Daubert-Danner near bp
  cp_solid:        2317.0      # J/kgK [PAPER] Coletto supp. Table 1
  cp_vapor:        1926.0      # J/kgK [PAPER] Coletto supp. Table 1
  cp_water_liquid: 4186.0      # J/kgK [STD]
  cp_water_vapor:  1900.0      # J/kgK [STD] steam ~370 K
  cp_hexane_vapor: 1650.0      # J/kgK [STD] n-hexane gas ~340-370 K
  cp_hexane_liquid: 2260.0     # J/kgK [STD] liquid n-hexane
  cp_oil:          2000.0      # J/kgK [STD estimate] soybean oil
  mu_vapor:        1.329e-5    # Pa.s  [PAPER] Coletto supp. Table 1
  k_ps:    0.29                # W/mK  [PAPER] solid thermal conductivity
  k_pg:    0.02371             # W/mK  [PAPER] pore-gas (hexane/water vapor)
  k_mixL:  0.24                # W/mK  [PAPER] porous solid mixture
  bed_porosity:      0.40      # -     [PAPER] eps_b, Cardarelli et al. (2002)
  particle_porosity: 0.50      # -     [PAPER] eps_p
  alpha_ps:          0.50      # -     [DERIVED] particle solid volume fraction
  alpha_pg:          0.50      # -     [DERIVED] particle pore-gas volume fraction
  particle_radius:   2.08e-4   # m     [DERIVED/calibrated] bounded industrial-flake diffusion length
  oil_fraction:      0.01      # kg/kg [PAPER-ish] residual oil in meal (X3)
  sorption_C0: 1.61e4          # [DERIVED/PAPER-bounded] Cardarelli 1996 caloric anchors
  sorption_C1: -0.4            # [DERIVED/PAPER-bounded]
  x2_critical: 0.20            # kg/kg  [PAPER] Faner et al. (2019) measured (theoretical eq. 4 ~0.43 is ~2x too high)
  water_diffusivity: 3.1e-11   # m2/s  [PAPER-adjacent, DERATED 20x] Touffet et al. (2026) / 20
  gab_params: {Xm: 5.183e-3, C0: 3.117e-3, dHC_R: 2262.0, K0: 9.172e-2, dHK_R: 729.6}  # [PAPER] Cardarelli & Crapiste (1996)
  oil_isotherm: {A0: 0.9635, B: 2.7036}                 # [PAPER] Coletto supp. Table 1
  water_luikov: {A1: 0.880, A2: 12.184}                 # [PAPER, extrapolated >70 C] Gianini/Luz et al. (2006)
  water_luz_drying: {k_a2: -0.33e-11, k_b2: 4.60e-9, k_a1: 7.0e-8, k_b1: 1.42e-5, k_c: 8.44e-3, xe_num: 0.834, xe_coef: 0.036}  # [PAPER] Luz et al. (2010)
  antoine_hexane: {A: 4.00266, B: 1171.53, C: -48.784}  # [STD] NIST n-hexane
  antoine_water:  {A: 5.11564, B: 1687.54, C: -42.98}   # [STD] NIST water

# ------------------------------------------------------------------ model params
model:
  D_eff: 4.0e-10              # m2/s  [PAPER] Cardarelli et al. (2002) Table 1
  D_ax:  1.022e-3             # m2/s  [PAPER] Coletto supp. Table 1
  n_particle_layers: 12      # -     [PAPER] Coletto: 12 spherical FVM shells
  nz_per_zone: 20            # -     [NUMERICAL] validation-run axial cells per zone per tray
  D_HW: 1.33e-5              # m2/s  [PAPER] Coletto supp. Table 1
  htc_correlation: {form: faner, c: 0.6949, m: 0.579, n: 0.3333}  # [PAPER] Nu-Re (B.7)
  outer_relaxation: 0.5      # [NUMERICAL] under-relaxation
  outer_tol: 1.0e-5          # [NUMERICAL]
  outer_max_iter: 100        # [NUMERICAL]
  sweep_arm_transfer_gain: 0.0   # Coletto-faithful B.7 only; old D1 workaround removed
  base_residence_s: 90.0     # s  [CALIBRATED DYNAMIC CLOSURE] nominal stage lag
  # real-time DT solve mesh + scheduling (coarser than a validation run)
  dt_nz_phz: 20              # -  [NUMERICAL] release-benchmark mesh
  dt_nz_ftrz: 20             # -  [NUMERICAL]
  dt_nz_dcz: 20              # -  [NUMERICAL]
  dt_outer_tol: 0.05         # -  [NUMERICAL] real-time FTRZ<->DCZ tolerance
  dt_outer_max_iter: 150     # -  [NUMERICAL] adaptive outer-loop cap (extreme-case continuation)
  dt_dcz_inner_max_iter: 100 # -  [NUMERICAL]
  # DT bottom clean-vapor boundary ([PLACE]); included in the delivered-direct heat ledger
  dt_vapor_feed_water_kg_s: 0.25  # kg/s  [PLACE]
  dt_vapor_feed_hex_kg_s: 0.0005  # kg/s  [PLACE]
  dt_vapor_feed_T: 371.0          # K     [PLACE]
  dc_hexane_mtc: 1.3e-2           # -     [PAPER-anchored] EPA AP-42 9.11.1 Table 4-4 meal-hexane cascade
  # sparge (direct) steam: 6.9 barG / ~170 C supply header, throttled to ~3 barG / ~144 C at the meal
  direct_steam_pressure_barg: 3.0 # bar g, sparge steam AT THE MEAL (throttled from the header)
  dt_pressure_drop_barg: 0.5      # bar g, lower-DT operating pressure above dome
  steam_supply_pressure_barg: 6.9 # bar g, steam supply header (~170 C, HMI readout)

# ---------------------------------------------------- operating defaults (HOT seeds)
operating_defaults:
  feed_flow_rate: 25.0        # kg/s dry solid [BENCHMARK OPERATING SEED]
  # Post-PHZ-refactor industry seed: 2.30 MW PREDESOLV + 0.20 MW lower jackets.
  indirect_steam:             # W per DT tray [CALIBRATED OPERATING SEED]
    PD1: 7.666667e5
    PD2: 7.666667e5
    PD3: 7.666666e5
    MN1: 8.33333e4
    MN2: 8.33333e4
    SP1: 3.33334e4
  direct_steam:               # kg/s sparge steam [INDUSTRIAL OPERATING SEED]
    SP1: 3.9
  sweep_arm_speed: {PD1: 3.0, PD2: 3.0, PD3: 3.0, MN1: 3.0, MN2: 3.0, SP1: 3.0, DR1: 3.0, CL1: 3.0}   # rpm
  transfer_device_position: {MN1_TO_MN2: 50, MN2_TO_SP1: 50, SP1_TO_DR1: 50, CL1_PRODUCT: 50} # 0-100 %
  heated_air_temp: 348.0      # K = ~75 C [CALIBRATED OPERATING SEED]
  heated_air_flow: 80.0       # kg/s [CALIBRATED OPERATING SEED] DRYER
  ambient_air_flow: 250.0     # kg/s [CALIBRATED OPERATING SEED] COOLER
  dt_resolve_interval_s: 120.0 # s SIM time between full solve_dt() re-solves (>=120 floor)

# --------------------------------------------------- disturbance defaults (HOT seeds)
disturbance_defaults:
  feed_temperature: 322.15    # K = 49 C        [PAPER/COAMO]
  feed_moisture: 0.124        # kg/kg dry solid [PAPER/COAMO]
  feed_hexane:   0.388        # kg/kg dry solid [PAPER/COAMO]
  feed_oil:      0.0137       # kg/kg dry solid [PAPER/COAMO]
  ambient_air_temp: 298.0     # K [DISTURBANCE SEED] replace with measured weather
  ambient_relative_humidity: 0.50  # 0-1 [DISTURBANCE SEED]

# ------------------------------------------------------------------ simulation
sim:
  speed_factor: 20.0          # 20x (brings the ~20-30 min transient to ~60-90 real s; 1.0 for real time)
  dt_wall_s: 0.2              # [NUMERICAL/RUNTIME] wall tick
  max_control_interval_s: 10.0 # [NUMERICAL/RUNTIME] set to <= APC sample time
  clock: realtime             # realtime | freerun

# ------------------------------------------------------------- validation targets
# Validation-grade post-PHZ-refactor industry benchmark:
#   residence:        27.8 min total / 20.1 min hot contact
#   delivered steam:  74.7% after top water-vapor carry-through
#   PHZ removal:      ~14% of feed solvent
#   DT exit (SP1):    ~111.7 C / ~19.6% moisture / ~284 ppm residual hexane
#   DT dome vapor:    ~72.4 C / ~90.3 wt% hexane
# All ordered design, heat, solver, dome and meal gates pass.
