# DTDC Simulator — parameter reference (soybean base case)
# Companion to DTDC_Simulator_BuildSpec.md. Units are SI.
#
# This file MIRRORS the tuned active configuration -- it is a flattened, condensed
# snapshot of scenarios/soybean_default.yaml (geometry/model/operating/disturbance/sim)
# + properties/soybean.yaml (physical). Those two files are AUTHORITATIVE and carry the
# full per-value rationale; keep this reference in sync when they change. Not loaded by
# any code (docs only).
#
# PROVENANCE TAGS (read before trusting any number):
#   [PAPER]   taken from a cited paper's stated value or base case
#   [DERIVED] computed from other [PAPER] values or standard correlations
#   [PLACE]   order-of-magnitude PLACEHOLDER — must be calibrated before quantitative use
#   [STD]     standard/handbook physical constant
#
# Primary sources:
#   Coletto, Bandoni & Blanco (2022) J. Food Eng. 318, 110870 (+ supp.)  -> correlations, cp/mu/k, D_ax/D_HW, oil isotherm
#   Cardarelli & Crapiste (1996) JAOCS 73(12) 1657                        -> GAB isotherm (soybean, exact)
#   Cardarelli, Crapiste & Mattea (2002) J. Food Eng. 52, 127            -> rho_solid, porosities, D_eff, particle radius
#   Faner, Perez & Crapiste (2019)                                        -> critical solvent content x2_critical, Nu-Re
#   Gianini/Luz et al. (2006) / Luz et al. (2010)                        -> water desorption + air-drying correlations
#   Touffet et al. (2026)                                                 -> water intraparticle diffusivity (derated)
#   Kemper / AOCS Lipid Library (2019)                                    -> tray depths, dome temperature, sparge steam

material: soybean

# ------------------------------------------------------------------ geometry
# DT: 2 predesolv (0.30 m, high end of AOCS 150-300 mm) + 1 main/countercurrent (1.0 m) +
# 1 sparge (1.0 m, AOCS ~1000 mm); 6 m dia. DC: dryer + cooler (4 m dia).
geometry:
  stages:
    - {id: PD1, role: PREDESOLV, diameter_m: 6.0, bed_height_m: 0.30}   # [PAPER] AOCS 150-300 mm (high end)
    - {id: PD2, role: PREDESOLV, diameter_m: 6.0, bed_height_m: 0.30}   # [PAPER]
    - {id: MN1, role: MAIN,      diameter_m: 6.0, bed_height_m: 1.00}   # [PAPER] AOCS 1000-1200 mm (FTRZ/DCZ)
    - {id: SP1, role: SPARGE,    diameter_m: 6.0, bed_height_m: 1.00}   # [PAPER] AOCS ~1000 mm (direct steam)
    - {id: DR1, role: DRYER,     diameter_m: 4.0, bed_height_m: 0.60}   # [PLACE]
    - {id: CL1, role: COOLER,    diameter_m: 4.0, bed_height_m: 0.60}   # [PLACE]

# --------------------------------------------------------------- physical params
# Mirrors properties/soybean.yaml (authoritative).
physical:
  dH_vap_hexane: 3.34e5        # J/kg  [STD] n-hexane at bp
  dH_vap_water:  2.26e6        # J/kg  [STD] water at 100 C
  T_boil_hexane: 341.9         # K     [STD] 68.7 C at 1 atm
  rho_solid:   1513.0          # kg/m3 [PAPER] Cardarelli et al. (2002) Table 1
  rho_ps:      1513.0          # kg/m3 [PAPER] particle solid-phase density
  rho_vapor_ref: 0.6           # kg/m3 [DERIVED] steam/hexane mix near 1 atm, ~373 K
  rho_hexane_liquid_ref: 615.0 # kg/m3 [DERIVED] Daubert-Danner near bp
  cp_solid:        2317.0      # J/kgK [PAPER] Coletto supp. Table 1
  cp_vapor:        1926.0      # J/kgK [PAPER] Coletto supp. Table 1
  cp_water_liquid: 4186.0      # J/kgK [STD]
  cp_water_vapor:  1900.0      # J/kgK [STD] steam ~370 K
  cp_hexane_vapor: 1650.0      # J/kgK [STD] n-hexane gas ~340-370 K
  cp_hexane_liquid: 2260.0     # J/kgK [STD] liquid n-hexane
  cp_oil:          2000.0      # J/kgK [PLACE] soybean oil
  mu_vapor:        1.329e-5    # Pa.s  [PAPER] Coletto supp. Table 1
  k_ps:    0.29                # W/mK  [PAPER] solid thermal conductivity
  k_pg:    0.02371             # W/mK  [PAPER] pore-gas (hexane/water vapor)
  k_mixL:  0.24                # W/mK  [PAPER] porous solid mixture
  bed_porosity:      0.40      # -     [PAPER] eps_b, Cardarelli et al. (2002)
  particle_porosity: 0.50      # -     [PAPER] eps_p
  alpha_ps:          0.50      # -     [DERIVED] particle solid volume fraction
  alpha_pg:          0.50      # -     [DERIVED] particle pore-gas volume fraction
  particle_radius:   2.0e-4    # m     [DERIVED] real soy FLAKE diffusion-length (~0.2 mm), not Cardarelli's 2 mm granule
  oil_fraction:      0.01      # kg/kg [PAPER-ish] residual oil in meal (X3)
  sorption_C0: 3.0e5           # [PLACE] heat-of-sorption; no printed source
  sorption_C1: -0.5            # [PLACE]
  x2_critical: 0.20            # kg/kg  [PAPER] Faner et al. (2019) measured (theoretical eq. 4 ~0.43 is ~2x too high)
  water_diffusivity: 3.1e-11   # m2/s  [PAPER-adjacent, DERATED 20x] Touffet et al. (2026) / 20
  gab_params: {Xm: 5.183e-3, C0: 3.117e-3, dHC_R: 2262.0, K0: 9.172e-2, dHK_R: 729.6}  # [PAPER] Cardarelli & Crapiste (1996)
  oil_isotherm: {A0: 0.9635, B: 2.7036}                 # [PAPER] Coletto supp. Table 1
  water_luikov: {A1: 0.880, A2: 12.184}                 # [PAPER, extrapolated >70 C] Gianini/Luz et al. (2006)
  water_luz_drying: {k_a2: -0.33e-11, k_b2: 4.60e-9, k_a1: 7.0e-8, k_b1: 1.42e-5, k_c: 8.44e-3, xe_num: 0.834, xe_coef: 0.036}  # [PAPER] Luz et al. (2010)
  antoine_hexane: {A: 4.00266, B: 1171.53, C: -48.784}  # [STD] NIST n-hexane
  antoine_water:  {A: 5.11564, B: 1687.54, C: -42.98}   # [STD] NIST water

# ------------------------------------------------------------------ model params
model:
  D_eff: 4.0e-10              # m2/s  [PAPER] Cardarelli et al. (2002) Table 1
  D_ax:  1.022e-3             # m2/s  [PAPER] Coletto supp. Table 1
  n_particle_layers: 12      # -     [PAPER] Coletto: 12 spherical FVM shells
  nz_per_zone: 20            # -     [PLACE] validation-run axial cells per zone per tray
  D_HW: 1.33e-5              # m2/s  [PAPER] Coletto supp. Table 1
  htc_correlation: {form: faner, c: 0.6949, m: 0.579, n: 0.3333}  # [PAPER] Nu-Re (B.7)
  outer_relaxation: 0.5      # [PLACE] under-relaxation
  outer_tol: 1.0e-5          # [PLACE]
  outer_max_iter: 100        # [PLACE]
  sweep_arm_transfer_gain: 1.0   # [PLACE] hQ *= 1 + gain*rpm^2 (agitation enhancement; lands DCZ ~380-383 K)
  base_residence_s: 90.0     # s  [PLACE] nominal per-stage lag at 3 rpm / 50% gate
  # real-time DT solve mesh + scheduling (coarser than a validation run)
  dt_nz_phz: 10              # -  [PLACE]
  dt_nz_ftrz: 10             # -  [PLACE]
  dt_nz_dcz: 8               # -  [PLACE]
  dt_outer_tol: 0.05         # -  [PLACE] real-time FTRZ<->DCZ outer-loop tolerance
  dt_outer_max_iter: 20      # -  [PLACE]
  dt_dcz_inner_max_iter: 100 # -  [PLACE]
  # DT bottom vapor boundary ([PLACE]); trimmed 5.0 -> 3.3 so the (dew-point) dome sits ~72 C
  dt_vapor_feed_water_kg_s: 3.3   # kg/s  [PLACE]
  dt_vapor_feed_hex_kg_s: 0.0005  # kg/s  [PLACE]
  dt_vapor_feed_T: 371.0          # K     [PLACE]
  dc_hexane_mtc: 1.3e-2           # -     [PAPER-anchored] EPA AP-42 9.11.1 Table 4-4 meal-hexane cascade
  # sparge (direct) steam: 6.9 barG / ~170 C supply header, throttled to ~3 barG / ~144 C at the meal
  direct_steam_pressure_barg: 3.0 # bar g, sparge steam AT THE MEAL (throttled from the header)
  steam_supply_pressure_barg: 6.9 # bar g, steam supply header (~170 C, HMI readout)

# ---------------------------------------------------- operating defaults (HOT seeds)
operating_defaults:
  feed_flow_rate: 25.0        # kg/s dry solid  [PLACE]
  indirect_steam:             # W per DT tray (jacket duty)  [PLACE]
    PD1: 2.5e6
    PD2: 2.5e6
    MN1: 2.0e6
    SP1: 4.0e5
  direct_steam:               # kg/s sparge steam  [PLACE]
    SP1: 1.05
  sweep_arm_speed: {PD1: 3.0, PD2: 3.0, MN1: 3.0, SP1: 3.0}   # rpm  [PLACE]
  gate_opening:    {PD1: 50, PD2: 50, MN1: 50, SP1: 50}        # 0-100 % level/discharge gate  [PLACE]
  heated_air_temp: 360.0      # K = ~87 C  [PLACE] dryer inlet air
  heated_air_flow: 80.0       # kg/s  [PLACE] DRYER
  ambient_air_flow: 250.0     # kg/s  [PLACE] COOLER (~10:1 air:solid)
  dt_resolve_interval_s: 120.0 # s SIM time between full solve_dt() re-solves (>=120 floor)

# --------------------------------------------------- disturbance defaults (HOT seeds)
disturbance_defaults:
  feed_temperature: 330.0     # K = 56.85 C  [PAPER] meal from extractor ~55-60 C
  feed_moisture: 0.07         # kg/kg dry solid  [PAPER] ~5-10% incoming
  feed_hexane:   0.5815       # kg/kg dry solid = 35% hexane by total wet mass  [PAPER-adjacent]
  feed_oil:      0.01         # kg/kg dry solid (X3)  [PAPER-ish]
  ambient_air_temp: 298.0     # K  [PLACE] cooler inlet air (weather)
  ambient_relative_humidity: 0.50  # 0-1  [PLACE]

# ------------------------------------------------------------------ simulation
sim:
  speed_factor: 20.0          # 20x (brings the ~20-30 min transient to ~60-90 real s; 1.0 for real time)
  dt_wall_s: 0.2              # [PLACE] wall tick
  max_control_interval_s: 10.0 # [PLACE] set to <= your APC sample time
  clock: realtime             # realtime | freerun

# ------------------------------------------------------------- validation targets
# Expected steady-state behavior at the tuned base case above (feasibility bands), not inputs:
#   DT exit (SP1):    ~109 C / ~18% moisture / ~285 ppm residual hexane   (bands 105-110 / 16-21 / 100-500)
#   DT dome vapor:    ~72 C                                                (band 70-75, lean-steam optimum)
#   product (CL1):    ~36 C / ~9.7% moisture / ~22 ppm hexane             (<= ambient+10 / <=12.5 / <500)
#   drying-air hexane: ~23 ppm                                            (<< 1100 ppm, 10% LEL safety limit)
